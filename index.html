<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Apps Hub</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for clean icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 flex flex-col justify-between font-sans">

    <!-- Header Section -->
    <header class="text-center py-16 px-4">
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">
            Application Dashboard
        </h1>
    </header>

    <!-- Main Grid Section -->
    <main class="max-w-4xl mx-auto px-6 mb-auto w-full">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Tile 1: Crypto Event Tracker -->
            <a href="/crypto_event_tracker" class="group bg-white border border-slate-200/80 hover:border-cyan-400 rounded-2xl p-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-cyan-100 flex flex-col items-center justify-center text-center h-40">
                <div class="w-14 h-14 rounded-full bg-cyan-50 text-cyan-500 flex items-center justify-center text-xl mb-3 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <h2 class="text-base font-semibold text-slate-700 group-hover:text-cyan-600 transition-colors">Crypto Event Tracker</h2>
            </a>

            <!-- Tile 2: Financial Ledger -->
            <a href="/financial_ledger" class="group bg-white border border-slate-200/80 hover:border-emerald-400 rounded-2xl p-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-emerald-100 flex flex-col items-center justify-center text-center h-40">
                <div class="w-14 h-14 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center text-xl mb-3 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h2 class="text-base font-semibold text-slate-700 group-hover:text-emerald-600 transition-colors">Financial Ledger</h2>
            </a>

            <!-- Tile 3: Future Trading Calculator -->
            <a href="/future_trding_calculator" class="group bg-white border border-slate-200/80 hover:border-indigo-400 rounded-2xl p-6 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-indigo-100 flex flex-col items-center justify-center text-center h-40">
                <div class="w-14 h-14 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl mb-3 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-calculator"></i>
                </div>
                <h2 class="text-base font-semibold text-slate-700 group-hover:text-indigo-600 transition-colors">Future Trading Calculator</h2>
            </a>

        </div>
    </main>

    <!-- Footer Section -->
    <footer class="text-center py-8 text-xs text-slate-400 mt-16 border-t border-slate-200/60">
        <p>&copy; 2026 umeshchulanga. All apps hosted via GitHub Pages.</p>
    </footer>

</body>
</html>
