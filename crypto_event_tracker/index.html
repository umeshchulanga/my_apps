<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Event Handler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-chart-line me-2"></i>EventTracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-2">
                        <button class="btn btn-outline-light btn-sm" onclick="exportData()"><i class="fa-solid fa-download me-1"></i> Export</button>
                    </li>
                    <li class="nav-item me-2">
                        <label class="btn btn-outline-light btn-sm mb-0 cursor-pointer">
                            <i class="fa-solid fa-upload me-1"></i> Import
                            <input type="file" id="importFile" accept=".json" class="d-none" onchange="importData(event)">
                        </label>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-dark btn-sm" id="themeToggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row mb-4">
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card text-center h-100 shadow-sm border-0 bg-primary text-white">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-2 text-white-50">Total Events</h6>
                        <h2 class="display-6 fw-bold mb-0" id="statTotal">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card text-center h-100 shadow-sm border-0 bg-success text-white">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-2 text-white-50">Active Events</h6>
                        <h2 class="display-6 fw-bold mb-0" id="statActive">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card text-center h-100 shadow-sm border-0 bg-danger text-white">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-2 text-white-50">Expired Events</h6>
                        <h2 class="display-6 fw-bold mb-0" id="statExpired">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 mb-3">
                <div class="card stat-card text-center h-100 shadow-sm border-0 bg-warning text-dark">
                    <div class="card-body">
                        <h6 class="text-uppercase mb-2 text-dark-50">Total Volume (USDT)</h6>
                        <h2 class="display-6 fw-bold mb-0" id="statVolume">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4 align-items-center">			
			<div class="col-md-8 d-flex flex-wrap gap-2 mb-2 mb-md-0">
				<input type="text" id="searchName" class="form-control w-auto" placeholder="Search events..." oninput="filterEvents()">
				
				<select id="filterStatus" class="form-select w-auto" onchange="filterEvents()">
					<option value="">All Statuses</option>
					<option value="Upcoming">Upcoming</option>
					<option value="Active">Active</option>
					<option value="Completed">Completed</option>
					<option value="Expired">Expired</option>
				</select>
				
				<select id="filterCategory" class="form-select w-auto" onchange="filterEvents()">
					<option value="">All Categories</option>
				</select>
				
				<select id="filterCheckType" class="form-select w-auto" onchange="filterEvents()">
					<option value="">All Checking Types</option>
					<option value="Once">Once</option>
					<option value="Daily">Daily</option>
					<option value="Weekly">Weekly</option>
					<option value="Monthly">Monthly</option>
					<option value="Manual">Manual</option>
				</select>

				<select id="filterType" class="form-select w-auto" onchange="filterEvents()">
					<option value="">All Trading Types</option>
				</select>
			</div>

			
            <div class="col-md-4 text-md-end">
                <button class="btn btn-primary shadow-sm" onclick="openEventModal()"><i class="fa-solid fa-plus me-1"></i> Add Event</button>
            </div>
        </div>

        <div class="row" id="eventContainer">
            </div>
    </div>

    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form id="eventForm" onsubmit="handleFormSubmit(event)">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle">Add Trading Event</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="eventId">
                        <div class="row g-3">
						
							<div class="col-md-12 mb-3">
								<label class="form-label">Event Category <span class="text-danger">*</span></label>
								<select id="eventCategory" class="form-select" required>									
								</select>
							</div>
                            <div class="col-md-6">
                                <label class="form-label">Event Name <span class="text-danger">*</span></label>
                                <input type="text" id="eventName" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Reference URL</label>
                                <input type="url" id="eventUrl" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Start Date & Time <span class="text-danger">*</span></label>
                                <input type="datetime-local" id="eventStart" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Expire Date & Time <span class="text-danger">*</span></label>
                                <input type="datetime-local" id="eventExpiry" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Checking Type</label>
                                <select id="eventCheckType" class="form-select">
                                    <option value="Once">Once</option>
                                    <option value="Daily">Daily</option>
                                    <option value="Weekly">Weekly</option>
                                    <option value="Monthly">Monthly</option>
                                    <option value="Manual">Manual</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Checked-In Days</label>
                                <input type="number" id="eventCheckedIn" class="form-control" min="0" value="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status Override</label>
                                <select id="eventStatus" class="form-select">
                                    <option value="Auto">Auto-Calculate</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description / Notes</label>
                                <textarea id="eventNotes" class="form-control" rows="2"></textarea>
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="mb-0 fw-bold">Trading Requirements</h6>
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addTradingTypeRow()">
                                <i class="fa-solid fa-plus"></i> Add Type
                            </button>
                        </div>
                        <div id="tradingTypesContainer">
                            </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
